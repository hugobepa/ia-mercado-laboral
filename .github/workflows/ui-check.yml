name: UI Regression Check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  ui-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build app
        run: bun run build

      - name: Start preview server
        run: |
          bun run preview --host 127.0.0.1 --port 4321 > preview.log 2>&1 &

      - name: Wait for preview server
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4321/ > /dev/null; then
              echo "Preview server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Preview server failed to start"
          cat preview.log
          exit 1

      - name: Run UI check
        run: bun run ui:check http://127.0.0.1:4321/
