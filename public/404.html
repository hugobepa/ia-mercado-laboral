<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página no encontrada</title>
    <meta name="description" content="La página que buscas no existe" />
    <style>
      /* Minimal CSS - Sin dependencias externas */
      :root {
        --color-primary: #c86405;
        --color-secondary: #4a7c59;
        --color-neutral: #f5f1e6;
        --color-text: #2c2c2c;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--color-neutral);
        color: var(--color-text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 2rem;
        line-height: 1.6;
      }

      .container {
        text-align: center;
        max-width: 500px;
      }

      h1 {
        font-size: clamp(4rem, 15vw, 8rem);
        font-weight: 700;
        color: var(--color-primary);
        line-height: 1;
        margin-bottom: 1rem;
      }

      h2 {
        font-size: clamp(1.25rem, 4vw, 1.5rem);
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      p {
        color: var(--color-text);
        opacity: 0.8;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-block;
        background-color: var(--color-primary);
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        text-decoration: none;
        font-weight: 500;
        transition: background-color 0.2s ease;
      }

      .btn:hover {
        background-color: #a55204;
      }

      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        display: block;
      }

      /* Asimetría intencional (guía diseño no-IA) */
      .container {
        border-radius: 1rem 1rem 0.75rem 0.75rem;
        padding: 3rem 2rem;
        background: white;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
    </style>
    <!-- Preconnect para fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <span class="icon">🔍</span>
      <h1>404</h1>
      <h2>Página no encontrada</h2>
      <p>Lo sentimos, la página que buscas no existe o ha sido movida.</p>
      <a href="./" class="btn">← Volver al inicio</a>
    </div>

    <!-- Script opcional para detectar base path en GitHub Pages -->
    <script>
      (function () {
        // Detecta si estamos en un subdirectorio (GitHub Pages project site)
        const path = window.location.pathname;
        const match = path.match(/^\/([^\/]+)\/404/);
        if (match) {
          const repoName = match[1];
          // Actualiza el enlace de volver al inicio
          const btn = document.querySelector(".btn");
          if (btn) {
            btn.href = "/" + repoName + "/";
          }
        }
      })();
    </script>
  </body>
</html>
